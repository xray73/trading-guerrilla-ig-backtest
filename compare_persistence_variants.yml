name: Compare Persistence Variants

# Confronta il motore V6 standard (persistenza minima=1) contro varianti
# che richiedono 2/3/4 barre di persistenza del segnale prima di aprire
# una posizione, sui 5 periodi ufficiali. Motore: sottoclasse isolata
# gia' testata (sanity check locale: persistenza=1 == motore standard).
# Nessuna modifica a engine.py/sottoclassi esistenti. Output solo
# aggregato per periodo + totale.
on:
  workflow_dispatch: {}

jobs:
  compare-persistence:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installa dipendenze
        run: pip install dukascopy-python pandas numpy requests

      - name: Confronta varianti persistenza
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: python compare_persistence_variants.py

      - name: Carica risultati come artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compare-persistence-${{ github.run_id }}
          path: results/
          retention-days: 30
          if-no-files-found: warn
