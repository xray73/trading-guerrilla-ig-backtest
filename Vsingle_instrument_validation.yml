name: Single Instrument Validation (segnale vs baseline random)

# Passo 4 dell'imbuto di selezione asset: valida statisticamente il
# segnale Variante 6 su un simbolo, z-score contro 30 seed random per
# periodo, stesso metodo della generalizzazione originale DAX/FTSE100
# e di NIKKEI225. Job più pesante degli altri check (30 seed x 5
# periodi = 150 run del motore), stimato 15-25 minuti.
on:
  workflow_dispatch:
    inputs:
      symbol:
        description: 'Simbolo da validare (deve essere in INSTRUMENT_REGISTRY)'
        required: true
        default: 'SMI'
        type: string

jobs:
  single-validation:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installa dipendenze
        run: pip install pandas numpy requests

      - name: Scarica OHLC del simbolo da Cloudflare D1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          python -c "
          import os, sys, time, requests, pandas as pd
          DATABASE_ID = 'b9fbd4d6-7837-4d86-9c0f-ca60c0cf69e3'
          API_BASE = 'https://api.cloudflare.com/client/v4/accounts'
          symbol = '${{ github.event.inputs.symbol }}'
          token = os.environ['CLOUDFLARE_API_TOKEN']
          account_id = os.environ['CLOUDFLARE_ACCOUNT_ID']
          def d1_query(sql):
              url = f'{API_BASE}/{account_id}/d1/database/{DATABASE_ID}/query'
              headers = {'Authorization': f'Bearer {token}', 'Content-Type': 'application/json'}
              resp = requests.post(url, headers=headers, json={'sql': sql}, timeout=60)
              resp.raise_for_status()
              data = resp.json()
              if not data.get('success'):
                  raise RuntimeError(f'D1 query fallita: {data.get(\"errors\")}')
              return data['result'][0]['results']
          rows = []
          offset = 0
          while True:
              sql = f\"SELECT timestamp, open, high, low, close, volume FROM ohlc_prices WHERE symbol='{symbol}' ORDER BY timestamp LIMIT 5000 OFFSET {offset}\"
              batch = d1_query(sql)
              if not batch:
                  break
              rows.extend(batch)
              offset += 5000
              if len(batch) < 5000:
                  break
              time.sleep(0.2)
          df = pd.DataFrame(rows)
          if df.empty:
              print(f'ERRORE: nessuna riga per {symbol}'); sys.exit(1)
          df.to_csv(f'{symbol}_full.csv', index=False)
          print(f'{symbol}: {len(df)} righe -> {symbol}_full.csv')
          "

      - name: Valida segnale (z-score vs baseline random)
        run: python single_instrument_validation.py "${{ github.event.inputs.symbol }}"

      - name: Carica risultati come artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: single-validation-${{ github.event.inputs.symbol }}-${{ github.run_id }}
          path: results/
          retention-days: 30
          if-no-files-found: warn
