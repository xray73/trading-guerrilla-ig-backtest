name: Diagnose June-July 2026 Losses

# Scompone i trade V6 (scenari A e B) e mean-reversion (scenario B) del
# periodo 01/06-18/07/2026 per exit_reason, ADX all'ingresso, settimana
# e strumento — per capire perché il win rate osservato (26-27%) sia
# stato sotto il baseline storico (38-40%). Nessuna scrittura su D1.
on:
  workflow_dispatch: {}

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installa dipendenze
        run: pip install dukascopy-python pandas numpy

      - name: Esegui diagnostica
        run: python diagnose_junjul2026_losses.py

      - name: Carica risultati come artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: diagnose-junjul2026-${{ github.run_id }}
          path: results/
          retention-days: 30
          if-no-files-found: warn
