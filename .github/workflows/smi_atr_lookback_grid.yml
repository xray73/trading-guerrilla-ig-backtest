name: SMI ATR/Lookback Calibration

# Grid search ATR multiplier x breakout lookback per SMI (25 combo),
# train su 2023, verifica sui restanti 4 periodi, confronto contro la
# baseline grezza (ATR=1.5/lookback=20 copiati da DAX). Criterio di
# promozione fissato in chat 15/07/2026 (vedi docstring script).
# Job più pesante: 25 combo (train) + 4 (verifica) + 5 (baseline) = 34
# run del motore, stimato 20-30 minuti.
on:
  workflow_dispatch: {}

jobs:
  smi-calibration:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installa dipendenze
        run: pip install pandas numpy requests

      - name: Scarica OHLC SMI da Cloudflare D1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          python -c "
          import os, sys, time, requests, pandas as pd
          DATABASE_ID = 'b9fbd4d6-7837-4d86-9c0f-ca60c0cf69e3'
          API_BASE = 'https://api.cloudflare.com/client/v4/accounts'
          symbol = 'SMI'
          token = os.environ['CLOUDFLARE_API_TOKEN']
          account_id = os.environ['CLOUDFLARE_ACCOUNT_ID']
          def d1_query(sql):
              url = f'{API_BASE}/{account_id}/d1/database/{DATABASE_ID}/query'
              headers = {'Authorization': f'Bearer {token}', 'Content-Type': 'application/json'}
              resp = requests.post(url, headers=headers, json={'sql': sql}, timeout=60)
              resp.raise_for_status()
              data = resp.json()
              if not data.get('success'):
                  raise RuntimeError(f'D1 query fallita: {data.get(\"errors\")}')
              return data['result'][0]['results']
          rows = []
          offset = 0
          while True:
              sql = f\"SELECT timestamp, open, high, low, close, volume FROM ohlc_prices WHERE symbol='{symbol}' ORDER BY timestamp LIMIT 5000 OFFSET {offset}\"
              batch = d1_query(sql)
              if not batch:
                  break
              rows.extend(batch)
              offset += 5000
              if len(batch) < 5000:
                  break
              time.sleep(0.2)
          df = pd.DataFrame(rows)
          if df.empty:
              print('ERRORE: nessuna riga'); sys.exit(1)
          df.to_csv(f'{symbol}_full.csv', index=False)
          print(f'{symbol}: {len(df)} righe -> {symbol}_full.csv')
          "

      - name: Grid search calibrazione
        run: python smi_atr_lookback_grid.py

      - name: Carica risultati come artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smi-calibration-${{ github.run_id }}
          path: results/
          retention-days: 30
          if-no-files-found: warn
