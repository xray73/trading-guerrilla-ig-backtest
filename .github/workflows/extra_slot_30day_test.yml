name: Extra Slot 30day Test (analisi descrittiva)

# Versione estesa a 30 giorni feriali, con metriche complete di
# periodo (win/loss, profit factor, PnL, drawdown, R medio) per
# baseline/slot extra/combinato. Analisi descrittiva, NON riapre la
# decisione già presa il 15/07/2026 (segnale/rumore=0.012).
on:
  workflow_dispatch: {}

jobs:
  extra-slot-30day-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installa dipendenze
        run: pip install dukascopy-python pandas numpy

      - name: Esegui analisi
        run: python extra_slot_30day_test.py

      - name: Carica risultati come artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: extra-slot-30day-${{ github.run_id }}
          path: |
            extra_slot_30day_trades.csv
            extra_slot_30day_summary.csv
          retention-days: 30
          if-no-files-found: warn
