name: Test FTSE100 Composite Boost - Sweep Moltiplicatori (Principio 3 Anti-Rumore)

# Testa 4 moltiplicatori dichiarati prima di vedere risultati
# (1.1/1.3/1.5/1.7) per verificare se il pattern regge in modo
# graduale/coerente o se dipende da un valore isolato (Principio 3
# del Protocollo Anti-Rumore). Sanity check obbligatorio incluso.

on:
  workflow_dispatch: {}

jobs:
  test-ftse-composite-boost-sweep:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installa dipendenze
        run: pip install pandas numpy requests dukascopy-python

      - name: Esegui sweep + bootstrap per ogni moltiplicatore
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: python test_ftse_composite_boost_sweep.py
