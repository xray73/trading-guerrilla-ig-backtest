name: Mean Reversion Feasibility Test (Bollinger vs RSI, sovrapposizione V6)

on:
  workflow_dispatch: {}

jobs:
  mean-reversion-feasibility:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installa dipendenze
        run: pip install dukascopy-python pandas numpy

      - name: Esegui test fattibilita
        run: python mean_reversion_feasibility_test.py

      - name: Carica risultati come artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mean-reversion-feasibility-${{ github.run_id }}
          path: |
            mean_reversion_bollinger_feasibility.csv
            mean_reversion_rsi_feasibility.csv
          retention-days: 30
          if-no-files-found: warn
