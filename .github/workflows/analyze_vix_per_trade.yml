name: Analyze VIX Per Trade (v3 - soglie ADX multiple)

# v3: testa la robustezza dell'ipotesi VIX rispetto alla soglia ADX
# usata per selezionare la popolazione (20/25/30/35/40), su entrambi
# gli strumenti, con metodologia stop/target reale (48 barre).
# Nessuna scrittura su D1.
on:
  workflow_dispatch: {}

jobs:
  vix-per-trade-v3:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installa dipendenze
        run: pip install yfinance pandas numpy requests

      - name: Analizza VIX per trade (v3)
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: python analyze_vix_per_trade.py

      - name: Carica risultati come artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vix-per-trade-v3-${{ github.run_id }}
          path: results/
          retention-days: 30
          if-no-files-found: warn
