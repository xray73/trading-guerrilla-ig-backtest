name: Discover Dukascopy Instrument (SMI)

# Puramente di scoperta: trova il nome esatto della costante per
# SMI/Switzerland Blue Chip nella libreria dukascopy-python. Nessun
# dato scaricato, nessuna scrittura su D1 — sicuro da eseguire senza
# precondizioni. Stesso pattern già usato per ITALY40.
on:
  workflow_dispatch: {}

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installa dukascopy-python
        run: pip install dukascopy-python

      - name: Scopri costanti disponibili
        run: python discover_dukascopy_smi.py
