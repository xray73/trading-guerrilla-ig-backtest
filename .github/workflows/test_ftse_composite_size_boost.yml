name: Test FTSE100 Composite Size Boost (causale + bootstrap)

# Primo test causale sul regime composito (corr_dax_ftse_7d alta +
# atr_pct alta) applicato SOLO a FTSE100, con size boost 1.3x invece
# di riduzione. Criteri fissati prima di vedere risultati (vedi
# docstring dello script). Sanity check obbligatorio incluso, lo
# script si ferma da solo se fallisce.

on:
  workflow_dispatch: {}

jobs:
  test-ftse-composite-boost:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installa dipendenze
        run: pip install pandas numpy requests dukascopy-python

      - name: Esegui test causale + bootstrap
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: python test_ftse_composite_size_boost.py
