name: Allocator V6 (test / full)

# Allocatore leggero fedele al floating kill switch, costruito sopra i
# dati gia' in research_v6_candidates/candidate_path (nessun nuovo
# fetch Dukascopy). Parametro TEST_SCOPE:
#  - dax_2015_2016 (default): scala ridotta, con sanity check
#    automatico contro research_v6_trade_features
#  - full: DAX+FTSE100 su tutto lo storico — lanciare SOLO dopo che
#    dax_2015_2016 ha passato il sanity check
on:
  workflow_dispatch:
    inputs:
      test_scope:
        description: 'Scope: dax_2015_2016 (test ridotto) oppure full'
        required: true
        default: 'dax_2015_2016'
      debug_keys:
        description: 'candidate_key da tracciare in dettaglio (separati da virgola), vuoto per nessuno'
        required: false
        default: ''

jobs:
  run-allocator:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installa dipendenze
        run: pip install pandas requests

      - name: Esegui allocatore
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TEST_SCOPE: ${{ github.event.inputs.test_scope }}
          DEBUG_KEYS: ${{ github.event.inputs.debug_keys }}
        run: python allocator_v6.py
