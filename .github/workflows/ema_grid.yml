name: EMA Grid Search

# Due modi per lanciarlo:
# 1. Manuale: tab "Actions" del repo -> "EMA Grid Search" -> "Run workflow"
#    (funziona anche dall'app GitHub mobile / browser tablet)
# 2. Automatico: push su un branch che inizia con "run-ema-grid"
on:
  workflow_dispatch: {}
  push:
    branches:
      - 'run-ema-grid*'

# Evita run sovrapposte se lanciato per errore due volte — la seconda
# aspetta che la prima finisca invece di girare in parallelo o cancellarla.
concurrency:
  group: ema-grid-search
  cancel-in-progress: false

jobs:
  grid-search:
    runs-on: ubuntu-latest
    timeout-minutes: 180  # stima ~55min train + test/conferma, ampio margine

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installa dipendenze
        run: pip install pandas numpy requests

      - name: Scarica OHLC da Cloudflare D1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: python fetch_ohlc_d1.py

      - name: Grid search EMA (train -> test -> conferma)
        run: python ema_grid_search.py DAX_full.csv FTSE100_full.csv results/

      # if: always() cattura anche risultati parziali se il job va in
      # timeout o fallisce a metà (es. solo train completato)
      - name: Carica risultati come artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ema-grid-results-${{ github.run_id }}
          path: results/
          retention-days: 30
          if-no-files-found: warn
