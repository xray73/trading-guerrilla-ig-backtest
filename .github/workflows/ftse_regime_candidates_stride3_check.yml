name: FTSE Regime Candidates - Stride3 Robustness Check

# Controllo di robustezza su ftse_regime_candidates_persistence.py:
# stesso protocollo ma confronta stato a settimana t con stato a
# settimana t+3 invece di t+1, per verificare che la persistenza a
# finestra 21g non sia in parte artefatto della sovrapposizione tra
# finestre rolling adiacenti. Prerequisito: GBPUSD già caricato in D1
# (vedi workflow "Load OHLC Data").

on:
  workflow_dispatch: {}

jobs:
  ftse-regime-stride3:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installa dipendenze
        run: pip install pandas numpy requests dukascopy-python

      - name: Esegui controllo stride3 sui 3 candidati
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: python ftse_regime_candidates_stride3_check.py
