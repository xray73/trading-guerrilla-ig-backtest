name: Continuous Accantonamento Simulation v2 (tempo reale mensile)

on:
  workflow_dispatch: {}

jobs:
  continuous-accantonamento-sim-v2:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installa dipendenze
        run: pip install pandas numpy requests dukascopy-python

      - name: Esegui simulazione continua v2
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: python continuous_accantonamento_sim_v2.py
