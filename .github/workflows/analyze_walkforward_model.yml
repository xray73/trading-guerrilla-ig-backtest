name: Analyze Walkforward Model

# Modello logistico esteso con Efficiency Ratio (finestra 40),
# validato con walk-forward su 3 finestre storiche indipendenti
# (2018-2020, 2021-2023, 2024-2026) invece di un solo split. Verifica
# se il segnale Q4 si ripete su periodi mai visti prima, non solo su
# quello già osservato. Nessuna scrittura su D1.
on:
  workflow_dispatch: {}

jobs:
  walkforward-model:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installa dipendenze
        run: pip install pandas numpy requests yfinance scikit-learn

      - name: Modello walk-forward
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: python analyze_walkforward_model.py

      - name: Carica risultati come artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: walkforward-model-${{ github.run_id }}
          path: results/
          retention-days: 30
          if-no-files-found: warn
