name: ATR Regime (test + calibrazione)

# 1) Sanity check: con moltiplicatori 1.0 su tutte le fasce, deve
#    essere identico al motore con floating kill switch.
# 2) Grid search train (2015-16+2020-covid+2023+2024-25 uniti) su 81
#    combinazioni (3 finestre x 27 combo moltiplicatori), verifica su
#    2026-ytd (mai visto), stima rumore via bootstrap a blocchi di
#    giornata (informativo, non gating).
# Job pesante: 81 combo x 4 periodi train + 2 su test = ~326 run del
# motore, stimato 30-50 minuti.
on:
  workflow_dispatch: {}

jobs:
  atr-regime:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installa dipendenze
        run: pip install pandas numpy requests

      - name: Scarica OHLC DAX+FTSE100 da Cloudflare D1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: python fetch_ohlc_d1.py

      - name: Sanity check equivalenza
        run: python atr_regime_test.py

      - name: Calibrazione (grid search train + verifica test + rumore)
        run: python atr_regime_calibration.py

      - name: Carica risultati come artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: atr-regime-${{ github.run_id }}
          path: results/
          retention-days: 30
          if-no-files-found: warn
