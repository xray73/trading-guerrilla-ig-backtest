name: Router Combined Test (separati vs capitale condiviso)

on:
  workflow_dispatch: {}

jobs:
  router-combined:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installa dipendenze
        run: pip install dukascopy-python pandas numpy

      - name: Esegui confronto separati vs combinati
        run: python router_combined_test.py

      - name: Carica risultati come artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: router-combined-${{ github.run_id }}
          path: router_combined_trades.csv
          retention-days: 30
          if-no-files-found: warn
