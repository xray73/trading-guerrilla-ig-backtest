name: Daily Resample Broad Trend Test

# Testa il filtro trend ampio con vero resampling giornaliero (EMA100/200
# su chiusure daily) contro il baseline (EMA100/200 su barre 30min).
# Criterio: win_rate + pavimento trade (fissato in sessione), non z-score
# — job leggero, nessuna simulazione random necessaria.
on:
  workflow_dispatch: {}

jobs:
  daily-resample-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installa dipendenze
        run: pip install pandas numpy requests

      - name: Test resampling giornaliero
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: python daily_resample_test.py

      - name: Carica risultati come artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-resample-${{ github.run_id }}
          path: results/
          retention-days: 30
          if-no-files-found: warn
