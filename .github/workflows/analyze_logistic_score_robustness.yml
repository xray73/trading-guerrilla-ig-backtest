name: Analyze Logistic Score Robustness

# Robustezza del segnale trovato nel quartile 4 del modello logistico:
# bootstrap (1000 ricampionamenti) per l'intervallo di confidenza, e
# rimozione di una feature alla volta per verificare che non dipenda
# da un solo parametro dominante. Nessuna scrittura su D1.
on:
  workflow_dispatch: {}

jobs:
  logistic-robustness:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installa dipendenze
        run: pip install pandas numpy requests yfinance scikit-learn

      - name: Test di robustezza
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: python analyze_logistic_score_robustness.py

      - name: Carica risultati come artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logistic-robustness-${{ github.run_id }}
          path: results/
          retention-days: 30
          if-no-files-found: warn
