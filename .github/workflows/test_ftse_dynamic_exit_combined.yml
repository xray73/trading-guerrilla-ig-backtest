name: Test DAX+FTSE100 Dynamic Exit Combined (ADX + R, holdout dal via)

on:
  workflow_dispatch:
    inputs:
      holdout_period:
        description: 'Periodo da usare come holdout (2015-2016, 2020-covid, 2023, 2024-2025, 2026-ytd)'
        required: true
        default: '2020-covid'
        type: string

jobs:
  test-dynamic-exit-combined:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installa dipendenze
        run: pip install pandas numpy requests dukascopy-python

      - name: Esegui test causale + bootstrap
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: python test_ftse_dynamic_exit_combined.py "${{ github.event.inputs.holdout_period }}"
