name: Staircase Exit Test

# Testa l'uscita a scaletta (breakeven -> lock-in -> tetto alto, fino a
# 5R) su una griglia di 15 combinazioni, valutata con PnL/drawdown.
on:
  workflow_dispatch: {}

jobs:
  staircase-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installa dipendenze
        run: pip install pandas numpy requests

      - name: Test uscita a scaletta
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: python staircase_exit_test.py

      - name: Carica risultati come artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: staircase-exit-${{ github.run_id }}
          path: results/
          retention-days: 30
          if-no-files-found: warn
