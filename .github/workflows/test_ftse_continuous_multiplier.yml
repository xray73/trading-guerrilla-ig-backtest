name: Test FTSE100 Continuous Multiplier (idea 2, ATR%xcorr continuo)

on:
  workflow_dispatch: {}

jobs:
  test-ftse-continuous-multiplier:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installa dipendenze
        run: pip install pandas numpy requests dukascopy-python

      - name: Esegui test causale + bootstrap
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: python test_ftse_continuous_multiplier.py
