name: ATR Regime Persistent (con isteresi)

# Come atr_regime.yml, ma usa compute_atr_regime_persistent (isteresi
# sui confini dei tercili, riduce il rumore di cambio fascia — ispirato
# al concetto di "jump penalty" della letteratura sui regime-switching
# model). Stesso train (4 periodi uniti) / test (2026-ytd), stessa
# esclusione delle combo uniformi, stessa stima del rumore.
on:
  workflow_dispatch: {}

jobs:
  atr-regime-persistent:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installa dipendenze
        run: pip install pandas numpy requests

      - name: Scarica OHLC DAX+FTSE100 da Cloudflare D1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: python fetch_ohlc_d1.py

      - name: Calibrazione con isteresi (grid search train + verifica test + rumore)
        run: python atr_regime_persistent_calibration.py

      - name: Carica risultati come artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: atr-regime-persistent-${{ github.run_id }}
          path: results/
          retention-days: 30
          if-no-files-found: warn
