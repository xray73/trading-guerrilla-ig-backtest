name: Router Combined 5 Periods Test (separati vs combinati, ufficiali)

on:
  workflow_dispatch: {}

jobs:
  router-combined-5periods:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installa dipendenze
        run: pip install dukascopy-python pandas numpy

      - name: Esegui confronto sui 5 periodi
        run: python router_combined_5periods_test.py

      - name: Carica risultati come artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: router-combined-5periods-${{ github.run_id }}
          path: router_combined_5periods_summary.csv
          retention-days: 30
          if-no-files-found: warn
