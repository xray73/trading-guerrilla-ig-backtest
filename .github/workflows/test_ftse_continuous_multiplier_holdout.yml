name: Test FTSE100 Continuous Multiplier - Holdout Validation

# Percentili fit SOLO su train (esclude 2020-covid), applicati
# all'holdout senza ricalibrare — stesso standard gia' usato per
# corr_ftse_gold. Report separato: solo holdout (il test vero) e tutti
# i 5 periodi con soglie fit-su-train (per confronto diretto con la
# versione originale fit-su-tutto, z=2.125).

on:
  workflow_dispatch: {}

jobs:
  test-ftse-continuous-holdout:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installa dipendenze
        run: pip install pandas numpy requests dukascopy-python

      - name: Esegui validazione holdout
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: python test_ftse_continuous_multiplier_holdout.py
