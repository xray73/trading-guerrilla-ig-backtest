name: Extract ADX Context Raw Data

# Fase 0 del percorso di analisi ADX/persistenza (18/07/2026): estrae
# TUTTI gli indicatori grezzi necessari per l'intera Fase 1 in un solo
# passaggio (ADX, EMA20/50/100/200, ATR, livelli breakout 20/40 barre,
# durata contesto trend) — così le analisi successive sono solo query
# dirette su D1, nessuna nuova estrazione. Storico continuo 2015-2026
# via Dukascopy diretto. Ricrea la tabella diagnostica adx_diagnostic_raw
# da zero (scratch table, non tocca ohlc_prices).
on:
  workflow_dispatch: {}

jobs:
  extract-raw-extended:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installa dipendenze
        run: pip install dukascopy-python pandas numpy requests

      - name: Estrai dati grezzi estesi
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: python extract_adx_context_raw.py
