name: Extract ADX Context Raw Data

# v4 (18/07/2026): aggiunge RSI(14) e Bollinger Bands (riusati da
# mean_reversion_signals.py, nessun parametro nuovo) per verificare se
# la scoperta "FTSE100 reverte meglio di DAX a bassissimo ADX" regge
# anche con l'indicatore reale della variante mean-reversion
# selezionata (RSI), non solo con la proxy EMA50 usata finora.
# Storico continuo 2015-2026 via Dukascopy diretto. Ricrea la tabella
# diagnostica adx_diagnostic_raw da zero (scratch table).
on:
  workflow_dispatch: {}

jobs:
  extract-raw-v4:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installa dipendenze
        run: pip install dukascopy-python pandas numpy requests

      - name: Estrai dati grezzi v4
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: python extract_adx_context_raw.py
