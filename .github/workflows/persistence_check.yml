name: Persistence Check ITALY40 vs DAX

# Passo 3 dell'imbuto di selezione asset: persistenza direzionale
# grezza (ADX>20 + continuazione EMA20/50), economico rispetto a un
# walk-forward completo — nessun backtest, solo un check descrittivo.
on:
  workflow_dispatch: {}

jobs:
  persistence-check:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installa dipendenze
        run: pip install pandas numpy requests

      - name: Calcola persistenza direzionale
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: python persistence_check.py

      - name: Carica risultati come artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: persistence-check-${{ github.run_id }}
          path: results/
          retention-days: 30
          if-no-files-found: warn
