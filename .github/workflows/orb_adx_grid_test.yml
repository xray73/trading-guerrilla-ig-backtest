name: ORB ADX Grid Test (train, un parametro alla volta)

on:
  workflow_dispatch: {}

jobs:
  orb-adx-grid:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installa dipendenze
        run: pip install dukascopy-python pandas numpy

      - name: Esegui griglia ADX
        run: python orb_adx_grid_test.py

      - name: Carica risultati come artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: orb-adx-grid-${{ github.run_id }}
          path: orb_adx_grid_train_results.csv
          retention-days: 30
          if-no-files-found: warn
