name: Persistence Check (generico, multi-simbolo)

# Sostituisce persistence_check.yml / persistence_check_smi.yml con un
# unico workflow parametrizzato. Nessuna whitelist necessaria (legge
# da D1 via SELECT, simboli inesistenti vengono solo segnalati e
# saltati) — a differenza del caricamento dati, qui non c'è rischio di
# caricare dati sbagliati per un nome costante Dukascopy errato.
#
# Uso: Actions -> "Run workflow" -> "targets" (es. "IBEX35,ITALY40"),
# "reference" (default DAX)
on:
  workflow_dispatch:
    inputs:
      targets:
        description: 'Simboli target da testare, separati da virgola (es. IBEX35,ITALY40)'
        required: true
        default: 'SMI'
        type: string
      reference:
        description: 'Simbolo di riferimento per il confronto'
        required: false
        default: 'DAX'
        type: string

jobs:
  persistence-check:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installa dipendenze
        run: pip install pandas numpy requests

      - name: Calcola persistenza direzionale
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: python persistence_check_generic.py "${{ github.event.inputs.targets }}" "${{ github.event.inputs.reference }}"

      - name: Carica risultati come artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: persistence-check-${{ github.run_id }}
          path: results/
          retention-days: 30
          if-no-files-found: warn
