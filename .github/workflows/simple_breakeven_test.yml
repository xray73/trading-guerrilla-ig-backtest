name: Simple Breakeven Test

# Ultimo tentativo della sessione (settimo): breakeven semplice, tocco
# singolo, nessun tetto, nessuna conferma. Griglia minima (3 livelli).
on:
  workflow_dispatch: {}

jobs:
  simple-be-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Installa dipendenze
        run: pip install pandas numpy requests
      - name: Test breakeven semplice
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: python simple_breakeven_test.py
      - name: Carica risultati come artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: simple-be-${{ github.run_id }}
          path: results/
          retention-days: 30
          if-no-files-found: warn
