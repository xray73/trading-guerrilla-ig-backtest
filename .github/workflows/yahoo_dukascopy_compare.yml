name: Yahoo vs Dukascopy Compare (Variante 6, controllo dati indipendente)

on:
  workflow_dispatch: {}

jobs:
  yahoo-dukascopy-compare:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installa dipendenze
        run: pip install dukascopy-python pandas numpy yfinance

      - name: Esegui confronto
        run: python yahoo_dukascopy_compare.py

      - name: Carica risultati come artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: yahoo-dukascopy-compare-${{ github.run_id }}
          path: yahoo_dukascopy_compare_results.csv
          retention-days: 30
          if-no-files-found: warn
