name: Test 4 - Stagnation Exit

# TEST 4/6 del programma di validazione. Un solo script: motore +
# sanity check (una volta) + ENTRAMBE le varianti (bar3, bar10)
# portate avanti fino in fondo, ciascuna con bootstrap completo sui 5
# periodi, nessuna selezione anticipata. Confronto finale fianco a
# fianco. Nessuna modifica a engine.py/sottoclassi esistenti.
on:
  workflow_dispatch: {}

jobs:
  test-stagnation-exit:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installa dipendenze
        run: pip install dukascopy-python pandas numpy requests

      - name: Test uscita stagnazione (motore + bootstrap, 2 varianti)
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: python test_stagnation_exit.py

      - name: Carica risultati come artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-stagnation-exit-${{ github.run_id }}
          path: results/
          retention-days: 30
          if-no-files-found: warn
