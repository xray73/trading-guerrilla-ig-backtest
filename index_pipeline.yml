name: Index Pipeline (validazione completa in un run)

# Pipeline unica: scoperta strumento (con freno di sicurezza se
# ambiguo), download OHLC, caricamento D1, correlazione, persistenza,
# validazione segnale, calibrazione ATR/lookback. Sostituisce la
# sequenza manuale di 5+ workflow separati usata finora per SMI.
#
# IMPORTANTE: il simbolo deve già avere una riga in INSTRUMENT_REGISTRY
# dentro index_pipeline.py (parametri IG verificati via screenshot:
# size minima, margine, point_value, spread) — la pipeline si rifiuta
# di partire senza quei dati reali, non li inventa.
#
# Se la costante Dukascopy non è ancora confermata (SYMBOL_DUKASCOPY_MAP),
# la pipeline prova una scoperta automatica ma SI FERMA se trova zero o
# più di un candidato — va completata a mano aggiungendo la costante
# corretta allo script, poi si rilancia.
#
# Job pesante: download 5 periodi + 34 run motore (validazione+calibrazione)
# stimato 30-45 minuti.
on:
  workflow_dispatch:
    inputs:
      symbol:
        description: 'Simbolo da validare (deve essere in INSTRUMENT_REGISTRY)'
        required: true
        default: 'TOPIX'
        type: string
      reference:
        description: 'Simbolo di riferimento per correlazione/persistenza'
        required: false
        default: 'FTSE100'
        type: string

jobs:
  index-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installa dipendenze
        run: pip install dukascopy-python pandas numpy requests

      - name: Esegui pipeline completa
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: python index_pipeline.py "${{ github.event.inputs.symbol }}" --reference "${{ github.event.inputs.reference }}"

      - name: Carica risultati come artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: index-pipeline-${{ github.event.inputs.symbol }}-${{ github.run_id }}
          path: results/
          retention-days: 30
          if-no-files-found: warn
