name: Extra Slot Test (N giorni, analisi descrittiva)

# Analisi descrittiva slot extra 4/5, finestra in giorni feriali
# selezionabile al lancio (tetto 180, imposto anche lato script).
# NON riapre la decisione già presa il 15/07/2026 (segnale/rumore=0.012).
on:
  workflow_dispatch:
    inputs:
      days:
        description: 'Numero di giorni feriali della finestra (max 180)'
        required: false
        default: '30'
        type: string

jobs:
  extra-slot-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installa dipendenze
        run: pip install dukascopy-python pandas numpy

      - name: Esegui analisi
        run: python extra_slot_test.py --days ${{ github.event.inputs.days }}

      - name: Carica risultati come artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: extra-slot-${{ github.event.inputs.days }}day-${{ github.run_id }}
          path: |
            extra_slot_*day_trades.csv
            extra_slot_*day_summary.csv
          retention-days: 30
          if-no-files-found: warn
