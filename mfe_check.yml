name: MFE Check

# Calcola la massima escursione favorevole (MFE) in unita' R per tutti i
# trade reali dei 5 periodi validati — puramente descrittivo, nessun
# filtro. Risponde a: i livelli 2R-5R sono raggiungibili in generale, o
# il 2023 e' un'anomalia?
on:
  workflow_dispatch: {}

jobs:
  mfe-check:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installa dipendenze
        run: pip install pandas numpy requests

      - name: Calcola MFE
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: python mfe_check.py

      - name: Carica risultati come artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mfe-check-${{ github.run_id }}
          path: results/
          retention-days: 30
          if-no-files-found: warn
